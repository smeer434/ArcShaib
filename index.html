<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cybersecurity Command Center • Threat Intelligence Dashboard</title>
    <script>
      // Gracefully mock standard WebSocket connections originating from Vite HMR client
      // to prevent "WebSocket closed without opened" errors in sandboxed iframe contexts
      (function() {
        if (typeof window !== 'undefined') {
          const OriginalWebSocket = window.WebSocket;
          if (OriginalWebSocket) {
            window.WebSocket = function(url, protocols) {
              const urlStr = String(url || '');
              const isHmr = urlStr.includes('vite') || urlStr.includes('hmr') || urlStr.includes('ws://') || urlStr.includes('wss://');
              
              if (isHmr) {
                console.warn('[Vite HMR WebSocket Intercepted] Silencing connection to:', url);
                
                // Construct a faithful mock WebSocket that sits perfectly in CLOSED state
                const mockSocket = {
                  url: urlStr,
                  readyState: 3, // CLOSED
                  bufferedAmount: 0,
                  extensions: "",
                  protocol: "",
                  binaryType: "blob",
                  onopen: null,
                  onmessage: null,
                  onerror: null,
                  onclose: null,
                  send: function() { return true; },
                  close: function() { return true; },
                  addEventListener: function(type, callback) {
                    if (type === 'close' && typeof callback === 'function') {
                      setTimeout(() => {
                        try {
                          callback({ type: 'close', wasClean: true, code: 1000, reason: "HMR disabled" });
                        } catch (e) {}
                      }, 10);
                    }
                  },
                  removeEventListener: function() {},
                  dispatchEvent: function() { return true; }
                };
                return mockSocket;
              }
              return new OriginalWebSocket(url, protocols);
            };
            
            // Mirror static properties
            window.WebSocket.prototype = OriginalWebSocket.prototype;
            window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
            window.WebSocket.OPEN = OriginalWebSocket.OPEN;
            window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
            window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
